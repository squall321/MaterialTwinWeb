# MaterialTwin Drive-Sync 설정. SignalForge drive-sync 키트 규약과 호환.
PROJ_PREFIX=mtw
PROJ_NAME=MaterialTwin

# rclone 리모트(Google Drive). SignalForge와 동일 리모트 재사용.
PROJ_DRIVE_REMOTE=ApptainerImages
PROJ_DRIVE_FOLDER=MaterialTwin

# 데이터 번들·SIF 보존 개수(Drive에서 최근 N세트만 유지).
PROJ_RETAIN=5

# 백엔드 위치(python -m app.sync 실행용). 배포 시 SIF 내부 경로로 대체 가능.
PROJ_BACKEND_DIR="$DS_DIR/../../backend"
PROJ_PY="$PROJ_BACKEND_DIR/.venv/bin/python"

# 앱 데이터 위치(SQLite·curves). 배포는 HEAX_DATA_DIR, 개발은 backend/var/data.
PROJ_DATA_DIR="${HEAX_DATA_DIR:-$PROJ_BACKEND_DIR/var/data}"
PROJ_DB_URL="sqlite:///$PROJ_DATA_DIR/materialtwin.db"

# 동기화할 SIF(HEAXHub 배포 산출물). 없으면 SIF 스테이지 skip.
PROJ_SIF_PATH="/home/koopark/claude/HEAXHub/var/sifs/materialtwin-web.sif"

# 헬스체크(선택).
PROJ_HEALTH_URL="http://127.0.0.1:9100/api/health"
