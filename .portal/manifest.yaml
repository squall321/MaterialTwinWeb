schema_version: 2
id: materialtwin_web
name: MaterialTwin Web
version: 1.1.0
owner: cae-automation
app_type: web_app
execution_target: linux_runner

description: |
  쯔윅(Zwick/Roell testXpert) 인장·완화 시험 데이터를 업로드받아 물성(E·Rp0.2·
  UTS·연신)과 구성방정식 피팅(Hollomon/Swift/Voce/J-C), 점탄성 Prony,
  LS-DYNA 카드(*MAT_024/*MAT_098/*MAT_VISCOELASTIC, 4개 단위계)까지 도출하는
  물성 플랫폼. LLM용 MCP 서버(조회 13·등록 7 도구) 동봉.
  fastapi_react 스택 — 서브경로(/apps/<slug>/)에서 자산·API가 깨지지 않도록
  상대경로 전략을 코드로 박아 둔다:
    - Vite base: "./"   → 번들 자산 URL 이 전부 상대경로 (서브경로 무관)
    - fetch("api/...")  → 현재 페이지 기준 상대경로 → 자동으로 /apps/<slug>/api/...
    - FastAPI 가 frontend/dist 를 StaticFiles 로 "/" 에 마운트 (/api/* 가 먼저 선언)
  데이터(SQLite·곡선 Parquet)는 런처가 주입하는 HEAX_DATA_DIR 영속 볼륨을
  자동 발견해 저장한다(config.py 폴백, D1 해소).

tags:
  - materials
  - tensile-test
  - zwick
  - fullstack
  - react
  - fastapi

build:
  stack: fastapi_react

launch:
  mode: service
  # fastapi_react 스택의 기본 entrypoint(uvicorn ... --root-path $ROOT_PATH)를 쓴다.
  # 커스텀이 필요할 때만 command 를 지정.

health_check:
  path: /api/health

restart_policy:
  policy: on_failure
  max_retries: 3

permissions:
  visibility: team

resources:
  cpu: 1
  memory_gb: 1
  gpu: false

source:
  type: git
  url: https://github.com/squall321/MaterialTwinWeb.git
  ref: main

# HWAX MCP Gateway 자동탐지 opt-in — HEAXHub /api/v1/mcp/servers 레지스트리에 노출되어
# 중앙 게이트웨이가 이 앱의 MCP를 자동 흡수한다(웹앱과 동일 포트의 /mcp에 마운트, HEAX 서비스 PAT 중앙 주입).
#   MCP 엔드포인트: /apps/materialtwin_web/mcp (streamable HTTP, 리다이렉트 없는 exact 경로)
#   에이전트 등록 예) claude mcp add --transport http materialtwin <포털베이스>/apps/materialtwin_web/mcp
# 안전장치: HTTP(페더레이션) 기본은 파괴적 삭제 툴(delete_material/delete_test)을 미노출한다
# (app.main이 MATERIALTWIN_MCP_ALLOW_DELETE=0 기본 주입). 개인 stdio는 전체 툴 노출.
mcp:
  expose: true
  path: /mcp
  transport: streamable_http

# HWAX MCP Gateway 자동탐지 opt-in — HEAXHub /api/v1/mcp/servers 레지스트리에 노출되어
# 중앙 게이트웨이가 이 앱의 MCP(/mcp, 웹앱 마운트)를 자동 흡수한다.
# HTTP 표면은 삭제 툴 비노출(MATERIALTWIN_MCP_ALLOW_DELETE=0 기본, app/main.py).
mcp:
  expose: true
  path: /mcp
  transport: streamable_http
